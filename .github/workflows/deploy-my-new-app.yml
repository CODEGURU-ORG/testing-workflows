name: MY-NEW-APP REACT APP CI/CD

on:
  push:
    branches:
      - main  # or whichever branch you want to deploy

jobs:
  deploy-react:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd /home/host_user/apps_backup/my-new-app
          npm install

      - name: Build React app
        run: |
          cd /home/host_user/apps_backup/my-new-app
          npm run build

      - name: Deploy locally
        run: |
          /home/host_user/apps_backup/shell_cmds/my_new_app.sh
