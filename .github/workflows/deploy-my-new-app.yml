name: MY-NEW-APP REACT APP CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy-react:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Deploy using server script
        run: |
          /bin/bash /home/host_user/TestApps/scripts/deploy_my_new_app.sh
