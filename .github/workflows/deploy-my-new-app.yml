name: MY-NEW-APP REACT APP CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy-react:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest code
        run: |
          cd /home/host_user/apps_backup/my-new-app
          git pull origin main

      - name: Build React app
        run: |
          cd /home/host_user/apps_backup/my-new-app
          npm run build

      - name: Deploy locally
        run: |
          /home/host_user/apps_backup/shell_cmds/my_new_app.sh
